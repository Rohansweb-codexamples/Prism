<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism | Creative Studio</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Favicon matching the logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%233b82f6;'/><stop offset='50%' style='stop-color:%236366f1;'/><stop offset='100%' style='stop-color:%23a855f7;'/></linearGradient></defs><rect width='80' height='80' x='10' y='10' rx='20' fill='url(%23g)'/><path d='M35 50 L50 35 L65 50 L50 65 Z' fill='white'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        prism: {
                            blue: '#3b82f6',
                            indigo: '#6366f1',
                            violet: '#8b5cf6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --prism-accent: #6366f1;
            --bg-main: #ffffff;
            --bg-sidebar: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.08);
        }

        .dark {
            --prism-accent: #818cf8;
            --bg-main: #020617;
            --bg-sidebar: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .prism-gradient {
            background: linear-gradient(135deg, #3b82f6, #6366f1, #a855f7);
            background-size: 200% 200%;
            animation: gradient-shift 8s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
        }

        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .studio-panel {
            position: fixed;
            right: -100%;
            top: 0;
            width: 65%;
            height: 100vh;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            transition: right 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 50;
            display: flex; flex-direction: column;
        }

        .studio-panel.active { right: 0; }

        .cursor-blink::after {
            content: '';
            display: inline-block;
            width: 6px;
            height: 14px;
            background: var(--prism-accent);
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--prism-accent); }
        
        .starter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        .starter-card:hover {
            border-color: var(--prism-accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .mode-toggle-pill {
            display: flex;
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 99px;
            padding: 2px;
            position: relative;
        }
        .mode-btn {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            z-index: 1;
            transition: color 0.2s;
        }
        .mode-btn.active { color: white; }
        .mode-bg {
            position: absolute;
            height: calc(100% - 4px);
            width: 50%;
            background: var(--prism-accent);
            border-radius: 99px;
            top: 2px;
            left: 2px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mode-toggle-pill[data-mode="studio"] .mode-bg { transform: translateX(100%); }

        /* Lockscreen Styles */
        #auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        #auth-overlay.unlocked {
            transform: translateY(-100%);
        }

        .btn-studio-ready {
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            border-radius: 9999px;
            padding: 12px 32px;
            font-weight: 800;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="flex h-screen">

    <!-- Mandatory Auth Screen -->
    <div id="auth-overlay">
        <div class="glass w-full max-w-md p-8 rounded-3xl space-y-6 shadow-2xl border-white/10 mx-4">
            <div class="text-center space-y-2">
                <div class="w-16 h-16 prism-gradient rounded-2xl mx-auto flex items-center justify-center text-white mb-6 shadow-xl shadow-indigo-500/20">
                    <i class="fas fa-shapes text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-white font-['Outfit']">Prism Studio</h2>
                <p class="text-sm text-slate-400">Sign in to access your creative workspace.</p>
            </div>

            <div id="google-btn-wrapper" class="flex justify-center py-2">
                <div id="g_id_onload"
                     data-client_id="731921089421-nffb5f1hiqo9mheaq6vmb45dqb9po6qc.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            </div>

            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-[10px] font-bold uppercase tracking-widest text-slate-500">or</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <button onclick="handleEmailAuth()" class="w-full prism-gradient py-3 rounded-xl text-white font-bold text-sm hover:scale-[1.02] active:scale-95 transition-all">Continue with Email</button>
            </div>
            
            <button onclick="enterGuestMode()" class="w-full text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-indigo-400 transition-colors py-2">
                Enter as Guest <i class="fas fa-arrow-right ml-1"></i>
            </button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar h-full flex flex-col z-20">
        <div class="px-5 mt-6 mb-2 flex items-center justify-between">
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Workspace</span>
            <button onclick="createNewChat()" class="text-slate-400 hover:text-indigo-500 transition-colors">
                <i class="fas fa-plus-circle"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 space-y-1" id="chat-list"></div>
        
        <div class="p-6 mt-auto border-t border-slate-200 dark:border-white/5 bg-slate-50 dark:bg-black/20">
            <div id="profile-trigger" class="flex items-center gap-3 opacity-90">
                <div id="user-avatar" class="w-8 h-8 rounded-lg prism-gradient flex items-center justify-center shadow-lg overflow-hidden">
                    <i class="fas fa-user text-white text-xs"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="user-name" class="text-[10px] font-bold tracking-widest uppercase dark:text-white text-slate-800 truncate">No Account</p>
                    <p id="user-status" class="text-[9px] text-slate-500 dark:text-slate-400">Offline</p>
                </div>
                <button onclick="logout()" class="text-slate-500 hover:text-red-500 transition-colors">
                    <i class="fas fa-sign-out-alt text-[10px]"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative">
        <header class="h-14 border-b border-slate-200 dark:border-white/5 flex items-center justify-between px-6 bg-white/80 dark:bg-[#020617]/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div id="online-indicator" class="w-2 h-2 rounded-full bg-slate-500"></div>
                <h2 class="font-semibold text-xs tracking-wider text-slate-600 dark:text-slate-300 uppercase">PRISM</h2>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 w-9 h-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
                <button onclick="toggleStudio()" class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-white/10 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-white/5 transition-all text-slate-500 dark:text-slate-400">
                    <i class="fas fa-code"></i> Studio
                </button>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 scroll-smooth">
            <div id="welcome-msg" class="max-w-3xl mx-auto py-12 space-y-10">
                <div class="space-y-4">
                    <h1 class="text-5xl font-extrabold tracking-tighter text-slate-900 dark:text-white font-['Outfit']">Hello, <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-cyan-500">Prism</span>.</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-lg leading-relaxed">Unified AI for creativity, code, and conversation.</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="quickAction('Analyze this text for sentiment and key themes')" class="starter-card p-6 rounded-[2rem] text-left">
                        <i class="fas fa-brain text-indigo-500 mb-4 text-xl"></i>
                        <p class="text-sm font-bold text-slate-800 dark:text-slate-200">Analysis</p>
                        <p class="text-[11px] text-slate-500 mt-2 uppercase tracking-wider">Reasoning</p>
                    </button>
                    <button onclick="quickAction('Build a interactive 3D landing page with Three.js')" class="starter-card p-6 rounded-[2rem] text-left">
                        <i class="fas fa-code-branch text-purple-500 mb-4 text-xl"></i>
                        <p class="text-sm font-bold text-slate-800 dark:text-slate-200">Development</p>
                        <p class="text-[11px] text-slate-500 mt-2 uppercase tracking-wider">Studio Mode</p>
                    </button>
                </div>
            </div>

            <div id="messages-list" class="max-w-3xl mx-auto space-y-10 pb-20"></div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-gradient-to-t from-white dark:from-[#020617] via-white dark:via-[#020617] to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <div class="flex items-center justify-between mb-3">
                    <div id="mode-toggle" class="mode-toggle-pill" data-mode="chat">
                        <div class="mode-bg"></div>
                        <button onclick="setMode('chat')" class="mode-btn active relative z-10" id="btn-chat-mode">Chat</button>
                        <button onclick="setMode('studio')" class="mode-btn relative z-10" id="btn-studio-mode">Studio</button>
                    </div>
                    <div id="typing-indicator" class="hidden text-[10px] font-bold text-indigo-500 uppercase tracking-widest animate-pulse">Prism is thinking...</div>
                </div>

                <div class="relative glass rounded-3xl transition-all shadow-xl border-slate-200 dark:border-white/10 overflow-hidden">
                    <textarea 
                        id="user-input" 
                        placeholder="Type a message or code request..." 
                        rows="1" 
                        class="w-full bg-transparent border-none focus:ring-0 py-5 px-6 text-slate-900 dark:text-white resize-none max-h-60 placeholder-slate-400 font-medium"
                        oninput="autoResize(this)"></textarea>
                    
                    <div class="flex items-center justify-between px-4 pb-4">
                        <div class="flex items-center gap-2">
                            <button class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-white/5 rounded-xl transition-all">
                                <i class="fas fa-paperclip"></i>
                            </button>
                        </div>
                        <button id="send-btn" onclick="handleSend()" class="h-10 px-5 prism-gradient rounded-xl text-white font-bold text-[10px] uppercase tracking-widest flex items-center gap-3 hover:scale-105 active:scale-95 transition-all shadow-lg shadow-indigo-500/20">
                            Process <i class="fas fa-bolt text-[8px]"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Studio Panel -->
    <div id="studio-panel" class="studio-panel shadow-2xl">
        <div class="h-14 border-b border-slate-200 dark:border-white/10 flex items-center justify-between px-6 bg-slate-50 dark:bg-[#0f172a]">
            <div class="flex items-center gap-3">
                <i class="fas fa-rocket text-indigo-500 text-xs"></i>
                <h3 class="font-bold text-[10px] uppercase tracking-widest text-slate-500">Studio Preview</h3>
            </div>
            <button onclick="toggleStudio()" class="w-8 h-8 rounded-full hover:bg-slate-200 dark:hover:bg-white/10 flex items-center justify-center transition-all">
                <i class="fas fa-times text-slate-400"></i>
            </button>
        </div>
        <div class="flex bg-slate-100 dark:bg-[#1e293b]">
            <button onclick="switchStudioTab('preview')" id="tab-preview" class="px-6 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 border-indigo-600 text-slate-900 dark:text-white">Live</button>
            <button onclick="switchStudioTab('code')" id="tab-code" class="px-6 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 border-transparent text-slate-500">Source</button>
        </div>
        <div class="flex-1 relative overflow-hidden bg-black">
            <div id="studio-preview" class="absolute inset-0 flex items-center justify-center">
                <div id="engine-ready" class="text-center p-12">
                    <h2 class="text-white text-5xl font-black mb-4 font-['Outfit'] tracking-tight">STUDIO READY</h2>
                    <p class="text-slate-500 mb-10 text-lg uppercase tracking-widest">Build something incredible</p>
                    <button class="btn-studio-ready" onclick="toggleStudio()">Enter Prompt</button>
                </div>
                <iframe id="studio-iframe" class="w-full h-full border-none hidden"></iframe>
            </div>
            <div id="studio-code" class="absolute inset-0 bg-[#0d0d0d] hidden p-6 overflow-auto">
                <pre class="font-mono text-sm text-indigo-300 leading-relaxed"><code id="code-content"></code></pre>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const BACKEND_URL = "https://prism-350g.onrender.com";
        
        let sessions = JSON.parse(localStorage.getItem('prism_sessions_v5') || '[]');
        let currentUser = JSON.parse(localStorage.getItem('prism_user_v5') || 'null');
        let currentSessionId = null;
        let isGenerating = false;
        let currentMode = 'chat';
        let ui = {};

        const MODEL = "gemini-2.5-flash-preview-09-2025";
        
        const SYSTEM_PROMPTS = {
            chat: `You are Prism, an advanced, multi-modal AI assistant. You can help with writing, analysis, coding, creative tasks, and more. 
                   If the user asks for a website, dashboard, or UI component, provide a single-file HTML/Tailwind solution inside \`\`\`html code blocks. 
                   Otherwise, respond helpfully and concisely to general questions.`,
            studio: `You are Prism Studio. Your primary goal is to build fully functional web applications or UI components. 
                    Always generate code for a single HTML file using Tailwind CSS and modern JS. 
                    Ensure the design is professional, dark-mode first, and high-quality. 
                    Wrap the code in \`\`\`html tags.`
        };

        window.onload = () => {
            ui = {
                userInput: document.getElementById('user-input'),
                messagesList: document.getElementById('messages-list'),
                chatWindow: document.getElementById('chat-window'),
                welcomeMsg: document.getElementById('welcome-msg'),
                studioPanel: document.getElementById('studio-panel'),
                studioIframe: document.getElementById('studio-iframe'),
                engineReady: document.getElementById('engine-ready'),
                codeContent: document.getElementById('code-content'),
                chatList: document.getElementById('chat-list'),
                modeToggle: document.getElementById('mode-toggle'),
                authOverlay: document.getElementById('auth-overlay'),
                onlineIndicator: document.getElementById('online-indicator'),
                typingIndicator: document.getElementById('typing-indicator')
            };

            ui.userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            if (currentUser) {
                unlockInterface();
            }

            renderChatList();
            if (sessions.length > 0) loadSession(sessions[0].id);
            else createNewChat();
        };

        function unlockInterface() {
            ui.authOverlay.classList.add('unlocked');
            updateAuthUI();
            if (currentUser.id !== 'guest') loadFromCloud();
        }

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        async function syncToCloud() {
            if (!currentUser || currentUser.id === 'guest') return;
            try {
                await fetch(`${BACKEND_URL}/api/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, sessions })
                });
                ui.onlineIndicator.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
            } catch (e) { 
                ui.onlineIndicator.className = "w-2 h-2 rounded-full bg-amber-500";
            }
        }

        async function loadFromCloud() {
            if (!currentUser || currentUser.id === 'guest') return;
            try {
                const res = await fetch(`${BACKEND_URL}/api/load/${currentUser.id}`);
                const data = await res.json();
                if (data.sessions && data.sessions.length > 0) {
                    sessions = data.sessions;
                    localStorage.setItem('prism_sessions_v5', JSON.stringify(sessions));
                    renderChatList();
                    if (sessions.length > 0) loadSession(sessions[0].id);
                }
            } catch (e) { console.warn("Load failed."); }
        }

        async function handleGoogleSignIn(response) {
            const payload = parseJwt(response.credential);
            currentUser = { id: payload.sub, name: payload.name, email: payload.email, picture: payload.picture };
            finalizeSignIn();
        }

        function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            if (!email || !email.includes('@')) return;
            currentUser = { id: btoa(email), name: email.split('@')[0], email };
            finalizeSignIn();
        }

        function enterGuestMode() {
            currentUser = { id: 'guest', name: 'Guest User', email: null };
            finalizeSignIn();
        }

        function finalizeSignIn() {
            localStorage.setItem('prism_user_v5', JSON.stringify(currentUser));
            unlockInterface();
        }

        function logout() {
            localStorage.removeItem('prism_user_v5');
            location.reload();
        }

        function updateAuthUI() {
            document.getElementById('user-name').innerText = currentUser.name;
            const isGuest = currentUser.id === 'guest';
            document.getElementById('user-status').innerText = isGuest ? "Local" : "Cloud Active";
            ui.onlineIndicator.className = isGuest ? "w-2 h-2 rounded-full bg-slate-500" : "w-2 h-2 rounded-full bg-emerald-500";
            
            if (currentUser.picture) {
                document.getElementById('user-avatar').innerHTML = `<img src="${currentUser.picture}" class="w-full h-full object-cover">`;
            } else {
                document.getElementById('user-avatar').innerHTML = `<i class="fas ${isGuest ? 'fa-user-secret' : 'fa-user'} text-white text-xs"></i>`;
            }
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        function setMode(mode) {
            currentMode = mode;
            ui.modeToggle.dataset.mode = mode;
            document.getElementById('btn-chat-mode').classList.toggle('active', mode === 'chat');
            document.getElementById('btn-studio-mode').classList.toggle('active', mode === 'studio');
        }

        function createNewChat() {
            const id = Date.now();
            const session = { id, title: "NEW PROJECT", history: [], studioCode: "" };
            sessions.unshift(session);
            loadSession(id);
        }

        function loadSession(id) {
            currentSessionId = id;
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            ui.messagesList.innerHTML = '';
            ui.welcomeMsg.classList.toggle('hidden', session.history.length > 0);
            session.history.forEach(m => appendMessageUI(m.role, m.content));
            refreshStudio(session.studioCode);
            renderChatList();
        }

        function renderChatList() {
            ui.chatList.innerHTML = '';
            sessions.forEach(s => {
                const btn = document.createElement('button');
                const active = s.id === currentSessionId;
                btn.className = `w-full text-left px-4 py-3 rounded-xl transition-all text-[10px] font-bold uppercase tracking-widest flex justify-between items-center group ${active ? 'bg-indigo-500/10 text-indigo-500 border border-indigo-500/20' : 'text-slate-500 hover:text-white hover:bg-white/5'}`;
                btn.innerHTML = `<span>${s.title}</span> <i class="fas fa-chevron-right text-[8px] opacity-0 group-hover:opacity-100"></i>`;
                btn.onclick = () => loadSession(s.id);
                ui.chatList.appendChild(btn);
            });
        }

        async function handleSend() {
            if (isGenerating) return;
            const text = ui.userInput.value.trim();
            if (!text) return;

            isGenerating = true;
            ui.userInput.value = '';
            ui.userInput.style.height = 'auto';
            ui.welcomeMsg.classList.add('hidden');
            ui.typingIndicator.classList.remove('hidden');
            appendMessageUI('user', text);

            const session = sessions.find(s => s.id === currentSessionId);
            const contents = [
                ...session.history.map(m => ({ 
                    role: m.role === 'user' ? 'user' : 'model', 
                    parts: [{ text: m.content }] 
                })),
                { role: 'user', parts: [{ text: text }] }
            ];

            try {
                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: contents,
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPTS[currentMode] }] }
                        })
                    }
                );

                const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Prism could not process this request.";
                appendMessageUI('bot', responseText);
                
                session.history.push({ role: 'user', content: text }, { role: 'bot', content: responseText });
                
                const codeMatch = responseText.match(/```html([\s\S]*?)```/);
                if (codeMatch) {
                    session.studioCode = codeMatch[1].trim();
                    refreshStudio(session.studioCode);
                    if (!ui.studioPanel.classList.contains('active')) toggleStudio();
                }

                if (session.title === "NEW PROJECT") {
                    session.title = text.substring(0, 15).toUpperCase();
                }
                
                saveData();
                renderChatList();
            } catch (err) {
                appendMessageUI('bot', "Connection unstable. Retrying in background...");
            } finally {
                isGenerating = false;
                ui.typingIndicator.classList.add('hidden');
            }
        }

        function appendMessageUI(role, text) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} mb-10`;
            const formattedText = text.replace(/```(\w+)?([\s\S]*?)```/g, '<pre class="bg-black/50 p-4 rounded-xl my-4 font-mono text-xs text-indigo-300 overflow-x-auto"><code>$2</code></pre>');
            div.innerHTML = `
                <div class="${role === 'user' ? 'bg-indigo-600 text-white rounded-[1.8rem] rounded-tr-none' : 'text-slate-300'} px-6 py-4 text-sm max-w-[85%] leading-relaxed shadow-xl">
                    <div class="content">${formattedText}</div>
                </div>
            `;
            ui.messagesList.appendChild(div);
            ui.chatWindow.scrollTo({ top: ui.chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function refreshStudio(code) {
            if (!code) {
                ui.engineReady.classList.remove('hidden');
                ui.studioIframe.classList.add('hidden');
                return;
            }
            ui.engineReady.classList.add('hidden');
            ui.studioIframe.classList.remove('hidden');
            ui.codeContent.innerText = code;
            const doc = ui.studioIframe.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
        }

        function toggleStudio() { ui.studioPanel.classList.toggle('active'); }
        function saveData() { localStorage.setItem('prism_sessions_v5', JSON.stringify(sessions)); syncToCloud(); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
        function quickAction(t) { ui.userInput.value = t; handleSend(); }

        function switchStudioTab(tab) {
            const isPreview = tab === 'preview';
            document.getElementById('studio-preview').classList.toggle('hidden', !isPreview);
            document.getElementById('studio-code').classList.toggle('hidden', isPreview);
            document.getElementById('tab-preview').className = `px-6 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 transition-all ${isPreview ? 'border-indigo-600 text-white' : 'border-transparent text-slate-500'}`;
            document.getElementById('tab-code').className = `px-6 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 transition-all ${!isPreview ? 'border-indigo-600 text-white' : 'border-transparent text-slate-500'}`;
        }
    </script>
</body>
</html>
